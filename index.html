<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jiasheng Zhou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: "Open Sans", system-ui, sans-serif;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      z-index: 0;
    }

    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      font-family: "Open Sans", system-ui, sans-serif;
    }

    .hamburger {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 24px;
      height: 18px;
      border: none;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      pointer-events: auto;
      padding: 0;
      transition: filter 0.2s;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.75);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .hamburger:hover span {
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    .sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: min(280px, 70vw);
      height: 100%;
      background: rgba(4,4,4,0.96);
      border-left: 1px solid rgba(255,255,255,0.12);
      box-shadow: -18px 0 40px rgba(0,0,0,0.85);
      transform: translateX(100%);
      transition: transform 220ms ease-out, opacity 220ms ease-out;
      opacity: 0;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      color: #f5f5f5;
    }
    .sidebar.open {
      transform: translateX(0);
      opacity: 1;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.9);
    }
    .close-btn {
      border: none;
      background: none;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .close-btn:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    .sidebar-body {
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
    }

    .sidebar-link {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .sidebar-link:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    .name-center {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 0;
      opacity: 0;
      animation: name-fade-in 2s linear 2s forwards;
    }

    .name-center .name {
      font-size: 48px;
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.08em;
    }

    .contact-btn {
      font-family: inherit;
      border: none;
      background: none;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .contact-btn:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    @keyframes name-fade-in {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="name-center">
    <span class="name">「 周加晟 」</span>
    <button type="button" id="contactBtn" class="contact-btn">contact</button>
  </div>
  <div class="ui">
    <button id="menuButton" class="hamburger" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <aside id="sidebar" class="sidebar" aria-label="Sidebar menu">
      <div class="sidebar-header">
        <div class="sidebar-title">jiasheng</div>
        <button id="closeSidebar" class="close-btn" aria-label="Close menu">×</button>
      </div>
      <div class="sidebar-body">
        <a href="/blog.html" class="sidebar-link">progress</a>
      </div>
    </aside>
  </div>

  <script>
    // Sidebar UI behaviour
    const menuButton = document.getElementById("menuButton");
    const sidebar = document.getElementById("sidebar");
    const closeSidebar = document.getElementById("closeSidebar");

    function openSidebar() {
      sidebar.classList.add("open");
    }

    function closeSidebarFn() {
      sidebar.classList.remove("open");
    }

    menuButton?.addEventListener("click", () => {
      if (sidebar.classList.contains("open")) closeSidebarFn();
      else openSidebar();
    });

    closeSidebar?.addEventListener("click", closeSidebarFn);

    // Contact button toggles to email on click
    const contactBtn = document.getElementById("contactBtn");
    const EMAIL = "hello@jiashe.ng";
    contactBtn?.addEventListener("click", () => {
      contactBtn.textContent = contactBtn.textContent === "contact" ? EMAIL : "contact";
    });
  </script>
  <script src="snow.js"></script>
</body>
</html>
