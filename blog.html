<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      background: #000;
      color: #f5f5f5;
      font-family: "Open Sans", system-ui, sans-serif;
    }

    body {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      background: rgba(4,4,4,0.8);
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .logo:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      margin-left: 24px;
      transition: color 0.2s, text-shadow 0.2s;
    }

    nav a:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    main {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 32px;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 48px;
    }

    .posts {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .post {
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, background 0.2s;
    }

    .post:hover {
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.04);
    }

    .post-title {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
      color: #fff;
    }

    .post-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .post-excerpt {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      margin: 0;
    }

    .post-body {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
    }

    .post-body p {
      margin: 0 0 12px;
    }

    .post-body p:last-child {
      margin-bottom: 0;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 640px) {
      header {
        padding: 16px 20px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      nav a {
        margin-left: 0;
        margin-right: 20px;
      }

      main {
        padding: 32px 20px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="logo">Home</a>
      <nav>
        <a href="/blog.html">progress</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>progress</h1>
    <p class="subtitle"></p>

    <div class="posts" id="posts"></div>
  </main>

  <script>
    const MAX_POSTS = 100;
    const postsEl = document.getElementById("posts");

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s ?? "";
      return div.innerHTML;
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
      if (match) {
        const meta = {};
        match[1].split("\n").forEach((line) => {
          const i = line.indexOf(":");
          if (i > -1) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
        });
        return { meta, body: match[2] };
      }
      return { meta: {}, body: text };
    }

    function renderPost(num, text) {
      const { meta, body } = parseFrontmatter(text);
      const html = marked.parse(body || "");
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        <h2 class="post-title">${escapeHtml(meta.title || String(num))}</h2>
        <div class="post-meta">${escapeHtml(meta.date || "")}</div>
        <div class="post-body">${html}</div>
      `;
      postsEl.appendChild(div);
    }

    (async () => {
      try {
        const results = await Promise.allSettled(
          Array.from({ length: MAX_POSTS }, (_, i) =>
            fetch(`entries/${i + 1}.md`).then((r) => (r.ok ? r.text() : null))
          )
        );
        const entries = results
          .map((r, i) => (r.status === "fulfilled" && r.value ? { num: i + 1, text: r.value } : null))
          .filter(Boolean)
          .sort((a, b) => b.num - a.num);

        for (const { num, text } of entries) {
          renderPost(num, text);
        }
      } catch (err) {
        postsEl.innerHTML = `<div class="empty-state">Could not load posts.</div>`;
      }
    })();
  </script>
</body>
</html>
